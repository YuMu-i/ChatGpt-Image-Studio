[app]
name = "chatgpt2api-studio"
version = "1.0.0"
api_key = ""
auth_key = "chatgpt2api"
image_format = "url"
max_upload_size_mb = 50

[server]
host = "0.0.0.0"
port = 7000
static_dir = "../web/out"

[chatgpt]
model = "gpt-image-2"
sse_timeout = 300
poll_interval = 3
poll_max_wait = 180
request_timeout = 30

[accounts]
default_quota = 5
prefer_remote_refresh = true
refresh_workers = 6

[storage]
auth_dir = "data/auths"
state_file = "data/accounts_state.json"
sync_state_dir = "data/sync_state"
image_dir = "data/tmp/image"

[sync]
enabled = false
base_url = ""
management_key = ""
request_timeout = 20
concurrency = 4
provider_type = "codex"

[log]
log_all_requests = false
