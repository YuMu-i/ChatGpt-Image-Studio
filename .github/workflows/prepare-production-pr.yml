name: Prepare Production PR

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  prepare-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Ensure main to production release pull request
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const head = `${owner}:main`;
            const base = "production";
            const title = "release: promote main to production";
            const body = [
              "## Release PR",
              "",
              "This PR promotes the latest validated changes from `main` into `production`.",
              "",
              "## Before merging",
              "",
              "1. Confirm the latest custom features on `main` are ready for production.",
              "2. Confirm any upstream sync changes on `main` have been reviewed and tested.",
              "3. Merge this PR when you want to trigger the production deployment workflow."
            ].join("\n");

            const compare = await github.rest.repos.compareCommitsWithBasehead({
              owner,
              repo,
              basehead: `${base}...main`,
            });

            if (compare.data.ahead_by === 0) {
              core.notice("main has no commits ahead of production. No release PR needed.");
              return;
            }

            const existing = await github.rest.pulls.list({
              owner,
              repo,
              state: "open",
              head,
              base,
            });

            if (existing.data.length > 0) {
              const pr = existing.data[0];
              core.notice(`Release PR already open: #${pr.number}`);

              await github.rest.pulls.update({
                owner,
                repo,
                pull_number: pr.number,
                title,
                body,
              });
              return;
            }

            const created = await github.rest.pulls.create({
              owner,
              repo,
              head: "main",
              base,
              title,
              body,
            });

            core.notice(`Created release PR #${created.data.number}`);
